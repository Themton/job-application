<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบคิดเงินเดือน - บริษัทเดอะเอ็มที</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf6ee;--card:#fff;--pri:#5c4a1e;--pri2:#8b6914;--acc:#c6952b;--acc2:#d4a73c;--txt:#3d3520;--txt2:#706040;--muted:#a89870;--bdr:#e2d5b8;--bdr2:#f0e8d4;--inp:#fdf9f0;--ok:#6a8c2a;--err:#c43e2a;--sh:0 1px 4px rgba(92,74,30,.06);--sh2:0 4px 14px rgba(92,74,30,.1);--sh3:0 12px 30px rgba(92,74,30,.14)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Noto Sans Thai',sans-serif;background:var(--bg);color:var(--txt);line-height:1.6}
.hdr{background:linear-gradient(135deg,#5c4a1e 0%,#8b6914 50%,#c6952b 100%);position:sticky;top:0;z-index:100}
.hdr-in{max-width:1200px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:11px}.logo{width:44px;height:44px;border-radius:10px;overflow:hidden;background:transparent;flex-shrink:0}.logo img{width:100%;height:100%;object-fit:contain}
.brand h1{font-size:17px;color:#fff;font-weight:600}.brand small{display:block;font-size:10px;color:rgba(255,255,255,.4)}
.nbtn{padding:7px 14px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:rgba(255,255,255,.75);border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:.2s;display:flex;align-items:center;gap:6px;text-decoration:none}
.nbtn:hover{background:rgba(255,255,255,.2);color:#fff}.nbtn.on{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.3);color:#fff}
.wrap{max-width:1200px;margin:0 auto;padding:24px 20px 50px}
.sts{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:20px}
.st{background:var(--card);border:1px solid var(--bdr);border-radius:11px;padding:14px 16px;box-shadow:var(--sh);position:relative;overflow:hidden}
.st .ic{position:absolute;top:8px;right:12px;font-size:20px;opacity:.12}.st .l{font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}.st .v{font-size:20px;font-weight:700;color:var(--pri)}
.st .u{font-size:10px;color:var(--muted)}
.tb{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.sb{flex:1;min-width:200px;position:relative}.sb input{width:100%;padding:10px 12px 10px 36px;border:1px solid var(--bdr);border-radius:8px;font-size:13px;font-family:inherit;background:var(--card);box-shadow:var(--sh);outline:none}.sb::before{content:"🔍";position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px}
.fbtn{padding:5px 12px;border:1px solid var(--bdr);border-radius:16px;font-size:11px;font-family:inherit;cursor:pointer;font-weight:500;background:var(--card);color:var(--txt2);transition:.2s;white-space:nowrap}
.fbtn:hover{border-color:var(--acc)}.fbtn.on{background:linear-gradient(135deg,#b8860b,#d4a73c);color:#fff;border-color:#b8860b}
.cbox{display:flex;align-items:center;gap:6px;background:var(--card);padding:6px 12px;border-radius:8px;border:1px solid var(--bdr);cursor:pointer;font-size:11px;color:var(--txt2);font-weight:500;font-family:inherit}
.cbox input{accent-color:var(--acc)}
.tw{background:var(--card);border:1px solid var(--bdr);border-radius:11px;overflow:hidden;box-shadow:var(--sh)}
.tw table{width:100%;border-collapse:collapse}
.tw th{text-align:left;padding:10px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);background:var(--inp);border-bottom:1px solid var(--bdr);cursor:pointer;user-select:none;white-space:nowrap}
.tw th:hover{color:var(--pri)}
.tw td{padding:9px 12px;font-size:12px;border-bottom:1px solid var(--bdr2)}
.tw tr:last-child td{border-bottom:none}.tw tbody tr{cursor:pointer;transition:.1s}.tw tbody tr:hover{background:rgba(194,122,44,.04)}
.tw tfoot td{padding:10px 12px;font-weight:700;background:var(--inp);border-top:2px solid var(--bdr);font-size:12px}
.nm{font-weight:600;color:var(--pri);font-size:13px}.nk{font-size:10px;color:var(--muted)}
.bg{display:inline-flex;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600}
.num{text-align:right;font-variant-numeric:tabular-nums;font-size:12px}
.half-c{color:#d97706;font-weight:700}.absent-c{color:var(--err);font-weight:700}.ded-c{color:var(--err);font-weight:600}
.strike{text-decoration:line-through;color:var(--muted);font-size:11px;margin-right:6px}
.changed{color:#d97706;font-weight:700}
.foot{color:var(--muted);font-size:10px;margin-top:12px;text-align:center;line-height:1.7}

/* Modal */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--card);border-radius:16px;padding:28px;max-width:940px;width:95%;max-height:92vh;overflow:auto;box-shadow:var(--sh3);border:1px solid var(--bdr)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.modal-hdr h2{font-size:20px;font-weight:700;color:var(--pri);margin:0}
.modal-hdr .sub{color:var(--txt2);font-size:13px}
.close-btn{background:var(--inp);border:1px solid var(--bdr);color:var(--muted);border-radius:8px;padding:8px 16px;cursor:pointer;font-size:16px;font-family:inherit}
.close-btn:hover{background:var(--bdr2)}
.method-tag{background:rgba(198,149,43,.12);color:#b8860b;padding:2px 10px;border-radius:6px;font-size:11px;font-weight:600;display:inline-block;margin-top:4px}
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.sum-card{background:var(--inp);border:1px solid var(--bdr);border-radius:10px;padding:12px;text-align:center}
.sum-card .sl{font-size:10px;color:var(--muted);text-transform:uppercase;margin-bottom:2px}
.sum-card .sv{font-size:20px;font-weight:700}.sum-card .su{font-size:9px;color:var(--muted)}
.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.pay-box{background:var(--inp);border:1px solid var(--bdr);border-radius:12px;padding:14px}
.pay-box h4{font-size:12px;font-weight:600;color:var(--ok);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--bdr2)}
.pay-box.ded h4{color:var(--err)}
.pay-row{display:flex;justify-content:space-between;padding:3px 0;font-size:13px}
.pay-row .lbl{color:var(--txt2)}.pay-row .val{font-weight:500}
.pay-row.total{border-top:1px solid var(--bdr);margin-top:4px;padding-top:6px;font-weight:700;font-size:14px}
.pay-row .neg{color:var(--err)}.pay-row .pos{color:var(--ok)}
.net-box{background:linear-gradient(135deg,#f0e8d4,#fdf9f0);border:2px solid var(--acc);border-radius:12px;padding:16px;text-align:center;margin-bottom:16px}
.net-box .nl{font-size:12px;color:var(--muted)}.net-box .nv{font-size:32px;font-weight:800;color:var(--pri)}
.net-box .comm{color:#d97706;font-size:14px;margin-top:4px}.net-box .diff{color:var(--txt2);font-size:12px;margin-top:4px}
.cal-legend{display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.cal-legend span{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.cal-legend .dot{width:10px;height:10px;border-radius:3px}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal .dh{text-align:center;font-size:10px;color:var(--muted);padding:3px}
.cal .day{border:1px solid var(--bdr2);border-radius:5px;padding:3px;text-align:center;min-height:46px}
.cal .day .dn{font-size:10px;color:var(--muted);font-weight:600}
.cal .day .tin{font-size:9px}.cal .day .tout{font-size:9px;color:#3b82f6}
.cal .day .tag{font-size:8px;font-weight:700;margin-top:1px}
.day-full{background:rgba(106,140,42,.06);border-color:rgba(106,140,42,.2)!important}
.day-half{background:rgba(217,119,6,.06);border-color:rgba(217,119,6,.25)!important}
.day-absent{background:rgba(196,62,42,.05);border-color:rgba(196,62,42,.2)!important}
.day-sun{background:rgba(0,0,0,.02);border-color:transparent!important}

@media(max-width:700px){.sum-grid{grid-template-columns:1fr 1fr}.pay-grid{grid-template-columns:1fr}.hdr-in{flex-direction:column;gap:8px}.tb{flex-direction:column}.tw{overflow-x:auto}.tw table{min-width:700px}.wrap{padding:16px 14px 40px}.brand h1{font-size:14px}}
</style>
</head>

function fmt(n) { return n === 0 ? "-" : n.toLocaleString("th-TH",{minimumFractionDigits:2,maximumFractionDigits:2}); }

function parseDay(s) {
  if (!s) return null;
  var times = [];
  s.split("\n").forEach(function(p) {
    var m = p.trim().match(/(\d{2}):(\d{2})/);
    if (m) times.push({h:+m[1],m:+m[2],raw:p.trim()});

  if (!times.length) return null;
  times.sort(function(a,b){return a.h*60+a.m-(b.h*60+b.m)});
  return {checkIn:times[0],checkOut:times.length>1?times[times.length-1]:null,all:times};
}

function classifyDay(d,s) {
  if (SUNDAYS.indexOf(d)>=0) return "sunday";
  var p = parseDay(s);
  if (!p) return "absent";
  if (d===31 && !p.checkOut) return "full";
  if (!p.checkOut) return "half";
  if (p.checkOut.h < 14) return "half";
  if (p.checkIn.h >= 12) return "half";
  var hrs = (p.checkOut.h*60+p.checkOut.m - p.checkIn.h*60-p.checkIn.m)/60;
  if (hrs < 4) return "half";
  return "full";

}

    var ti2 = adj2+emp.diligence;
    var t32 = emp.tax3>0 ? Math.round(ti2*0.03*100)/100 : 0;
    var s52 = emp.ss5>0 ? Math.min(Math.round(ti2*0.05*100)/100,750) : 0;
    var td2 = t32+s52+emp.loan+emp.advance;
    return {dailyRate:P_RATE,halfDayDed:hdd,absentDed:abd,attendanceDed:atd,adjSalary:adj2,totalIncome:ti2,tax3:t32,ss5:s52,totalDed:td2,net:Math.max(0,ti2-td2),isDaily:false,method:"ประจำ หัก "+P_RATE+" บ./วัน"};
  }
}

function matchAtt(emp, attendance) {
  var en = emp.name.replace(/\s*-\s*/g," ").replace(/\s+/g," ").trim();
  var parts = en.split(" ").filter(function(p){return p.length>1});
  for (var i=0;i<attendance.length;i++) {
    var an = attendance[i].name.replace(/\s+/g," ").trim(), mc=0;
    for (var j=0;j<parts.length;j++) if (an.indexOf(parts[j])>=0) mc++;
    if (mc>=2||(parts.length===1&&mc>=1)) return attendance[i];
  }
  if (emp.nickname) for (var k=0;k<attendance.length;k++) if (attendance[k].name.indexOf(emp.nickname)>=0) return attendance[k];
  return null;
}

function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

// Build enriched data
var EMPS = RAW.employees.map(function(emp) {
  var att = matchAtt(emp, RAW.attendance);
  var attA = analyzeAtt(att);
  var payroll = calcPayroll(emp, attA);
  return Object.assign({}, emp, {att:att, attA:attA, payroll:payroll});
});

function renderStats() {
  var active = EMPS.filter(function(e){return e.salary>0});
  var items = [
    {l:"พนักงาน",v:active.length+" คน",c:"var(--pri)",ic:"👥"},
    {l:"สุทธิเดิม",v:fmt(active.reduce(function(s,e){return s+e.net},0)),c:"var(--muted)",ic:"📋"},
    {l:"หักจากเวลา",v:fmt(active.reduce(function(s,e){return s+e.payroll.attendanceDed},0)),c:"var(--err)",ic:"⏱"},
    {l:"สุทธิใหม่",v:fmt(active.reduce(function(s,e){return s+e.payroll.net},0)),c:"var(--ok)",ic:"✅"},
    {l:"ครึ่งวัน",v:active.reduce(function(s,e){return s+e.attA.halfDays},0)+" ครั้ง",c:"#d97706",ic:"½"},
    {l:"ขาดงาน",v:active.reduce(function(s,e){return s+e.attA.absentDays},0)+" ครั้ง",c:"var(--err)",ic:"✗"},
  ];
  var h = "";
  items.forEach(function(s){
    h += '<div class="st"><div class="ic">'+s.ic+'</div><div class="l">'+s.l+'</div><div class="v" style="color:'+s.c+'">'+s.v+'</div></div>';
  });
  document.getElementById("stats-bar").innerHTML = h;
}

function renderFilters() {
  var h = "";
  ["ทั้งหมด"].concat(POS_ORDER).forEach(function(pos){
    h += '<button class="fbtn'+(curFilter===pos?' on':'')+'" onclick="setFilter(\''+pos.replace(/'/g,"\\'")+'\')">'+pos+'</button>';
  });
  document.getElementById("filterBtns").innerHTML = h;
}

function setFilter(f) { curFilter=f; renderFilters(); render(); }
function setSort(col) {
  if (sortBy===col) sortDir = sortDir==="asc"?"desc":"asc";
  else { sortBy=col; sortDir="asc"; }
  render();
}

function render() {
  var q = document.getElementById("searchInput").value.toLowerCase();
  var showC = document.getElementById("showComp").checked;
  var list = EMPS.filter(function(e){
    if (curFilter!=="ทั้งหมด" && e.position!==curFilter) return false;
    if (q && e.name.toLowerCase().indexOf(q)<0 && (!e.nickname||e.nickname.toLowerCase().indexOf(q)<0)) return false;
    return true;
  });
  list.sort(function(a,b){
    var va,vb;
    switch(sortBy){
      case "salary":va=a.salary;vb=b.salary;break;
      case "net":va=a.payroll.net;vb=b.payroll.net;break;
      case "halfDays":va=a.attA.halfDays;vb=b.attA.halfDays;break;
      case "absentDays":va=a.attA.absentDays;vb=b.attA.absentDays;break;
      case "attendanceDed":va=a.payroll.attendanceDed;vb=b.payroll.attendanceDed;break;
      default:va=a.name;vb=b.name;
    }
    if (typeof va==="string") return sortDir==="asc"?va.localeCompare(vb):vb.localeCompare(va);
    return sortDir==="asc"?va-vb:vb-va;
  });

  var si = function(col){return sortBy===col?(sortDir==="asc"?" ↑":" ↓"):" ↕";};
  var h = '<div class="tw"><table><thead><tr>';
  var cols = [
    {k:"name",l:"ชื่อ-นามสกุล",a:"left"},{k:"pos",l:"ตำแหน่ง",a:"left"},
    {k:"salary",l:"เงินเดือนเดิม",a:"right"},{k:"halfDays",l:"½วัน",a:"center"},
    {k:"absentDays",l:"ขาด",a:"center"},{k:"attendanceDed",l:"หักเวลา",a:"right"},
    {k:"net",l:showC?"เดิม → ใหม่":"สุทธิใหม่",a:"right"}
  ];
  cols.forEach(function(c){
    h += '<th style="text-align:'+c.a+'" onclick="setSort(\''+c.k+'\')">'+c.l+'<span style="opacity:.4">'+si(c.k)+'</span></th>';
  });
  h += '</tr></thead><tbody>';

  list.forEach(function(emp,i){
    var pc = POS_CLR[emp.position]||"#666";
    var hc = emp.payroll.attendanceDed > 0;
    h += '<tr onclick="showDetail('+i+')">';
    h += '<td><div class="nm">'+esc(emp.name)+'</div>'+(emp.nickname?'<div class="nk">('+esc(emp.nickname)+')</div>':'')+'</td>';
    h += '<td><span class="bg" style="background:'+pc+'14;color:'+pc+';border:1px solid '+pc+'30">'+esc(emp.position)+'</span></td>';
    h += '<td class="num">'+(emp.salary>0?fmt(emp.salary):"-")+'</td>';
    h += '<td style="text-align:center" class="'+(emp.attA.halfDays>0?"half-c":"")+'">'+(emp.attA.halfDays||"-")+'</td>';
    h += '<td style="text-align:center" class="'+(emp.attA.absentDays>0?"absent-c":"")+'">'+(emp.attA.absentDays||"-")+'</td>';
    h += '<td class="num '+(hc?"ded-c":"")+'">'+(hc?"-"+fmt(emp.payroll.attendanceDed):"-")+'</td>';
    if (showC && hc) {
      h += '<td class="num"><span class="strike">'+fmt(emp.net)+'</span><span class="changed">'+fmt(emp.payroll.net)+'</span></td>';
    } else {
      h += '<td class="num" style="font-weight:700;'+(hc?"color:#d97706":"")+'">'+fmt(emp.payroll.net)+'</td>';
    }
    h += '</tr>';
  });

  h += '</tbody><tfoot><tr>';
  h += '<td colspan="3" style="color:var(--pri)">รวม '+list.length+' คน</td>';
  h += '<td style="text-align:center;color:#d97706">'+list.reduce(function(s,e){return s+e.attA.halfDays},0)+'</td>';
  h += '<td style="text-align:center;color:var(--err)">'+list.reduce(function(s,e){return s+e.attA.absentDays},0)+'</td>';
  h += '<td class="num" style="color:var(--err)">-'+fmt(list.reduce(function(s,e){return s+e.payroll.attendanceDed},0))+'</td>';
  h += '<td class="num" style="color:var(--ok)">'+fmt(list.reduce(function(s,e){return s+e.payroll.net},0))+'</td>';
  h += '</tr></tfoot></table></div>';

  document.getElementById("tableArea").innerHTML = h;
  window._filteredList = list;
}

function showDetail(idx) {
  var emp = window._filteredList[idx];
  if (!emp) return;
  var p = emp.payroll, a = emp.attA, att = emp.att;
  var dayNames = ["อา.","จ.","อ.","พ.","พฤ.","ศ.","ส."];
  var clsColor = {full:"var(--ok)",half:"#d97706",absent:"var(--err)",sunday:"#999"};
  var clsLabel = {full:"เต็มวัน",half:"ครึ่งวัน",absent:"ขาด",sunday:"หยุด"};

  var h = '<div class="modal-hdr"><div><h2>'+esc(emp.name)+'</h2>';
  h += '<div class="sub">'+(emp.nickname?'('+esc(emp.nickname)+') • ':'')+esc(emp.position)+'</div>';
  h += '<div class="method-tag">'+esc(p.method)+'</div></div>';
  h += '<button class="close-btn" onclick="closeModal()">✕</button></div>';

  // Summary cards
  h += '<div class="sum-grid">';
  [{l:"เต็มวัน",v:a.fullDays,c:"var(--ok)",u:"วัน"},{l:"ครึ่งวัน",v:a.halfDays,c:"#d97706",u:"วัน"},{l:"ขาดงาน",v:a.absentDays,c:"var(--err)",u:"วัน"},{l:p.isDaily?"วันทำงานรวม":"หักจากเวลา",v:p.isDaily?p.effectiveDays:fmt(p.attendanceDed),c:p.isDaily?"#0284c7":"var(--err)",u:p.isDaily?"วัน":"บาท"}].forEach(function(s){
    h += '<div class="sum-card"><div class="sl">'+s.l+'</div><div class="sv" style="color:'+s.c+'">'+s.v+'</div><div class="su">'+s.u+'</div></div>';
  });
  h += '</div>';

  // Payroll breakdown
  h += '<div class="pay-grid"><div class="pay-box"><h4>💰 รายรับ</h4>';
  if (p.isDaily) {
    h += '<div class="pay-row"><span class="lbl">อัตราวันละ</span><span class="val">'+fmt(D_RATE)+' บ.</span></div>';
    h += '<div class="pay-row"><span class="lbl">เต็มวัน × '+a.fullDays+'</span><span class="val pos">'+fmt(a.fullDays*D_RATE)+'</span></div>';
    if (a.halfDays>0) h += '<div class="pay-row"><span class="lbl">ครึ่งวัน × '+a.halfDays+'</span><span class="val" style="color:#d97706">'+fmt(a.halfDays*D_RATE/2)+'</span></div>';
  } else {
    h += '<div class="pay-row"><span class="lbl">เงินเดือนเดิม</span><span class="val">'+fmt(emp.salary)+'</span></div>';
    if (p.halfDayDed>0) h += '<div class="pay-row"><span class="lbl">หักครึ่งวัน ('+a.halfDays+'×'+P_RATE/2+')</span><span class="val neg">-'+fmt(p.halfDayDed)+'</span></div>';
    if (p.absentDed>0) h += '<div class="pay-row"><span class="lbl">หักขาด ('+a.absentDays+'×'+P_RATE+')</span><span class="val neg">-'+fmt(p.absentDed)+'</span></div>';
  }
  h += '<div class="pay-row"><span class="lbl">เงินเดือนหลังหัก</span><span class="val" style="color:#d97706;font-weight:600">'+fmt(p.adjSalary)+'</span></div>';
  if (emp.diligence>0) h += '<div class="pay-row"><span class="lbl">เบี้ยขยัน</span><span class="val pos">+'+fmt(emp.diligence)+'</span></div>';
  h += '<div class="pay-row total"><span>รวมรายรับ</span><span class="pos">'+fmt(p.totalIncome)+'</span></div></div>';

  h += '<div class="pay-box ded"><h4>📉 รายหัก</h4>';
  if (p.tax3>0) h += '<div class="pay-row"><span class="lbl">ภาษี 3%</span><span class="val neg">'+fmt(p.tax3)+'</span></div>';
  if (p.ss5>0) h += '<div class="pay-row"><span class="lbl">ประกันสังคม 5%</span><span class="val neg">'+fmt(p.ss5)+'</span></div>';
  if (emp.loan>0) h += '<div class="pay-row"><span class="lbl">กยศ.</span><span class="val neg">'+fmt(emp.loan)+'</span></div>';
  if (emp.advance>0) h += '<div class="pay-row"><span class="lbl">เบิกล่วงหน้า</span><span class="val neg">'+fmt(emp.advance)+'</span></div>';
  h += '<div class="pay-row total"><span>รวมหัก</span><span class="neg">'+fmt(p.totalDed)+'</span></div></div></div>';

  // Net
  h += '<div class="net-box"><div class="nl">เงินเดือนสุทธิ</div><div class="nv">฿'+fmt(p.net)+'</div>';
  if (emp.commission>0) h += '<div class="comm">+ คอมมิชชั่น ฿'+fmt(emp.commission)+'</div>';
  if (p.attendanceDed>0) h += '<div class="diff">เดิม ฿'+fmt(emp.net)+' → หักเวลา ฿'+fmt(p.attendanceDed)+' → ใหม่ ฿'+fmt(p.net)+'</div>';
  h += '</div>';

  // Calendar
  if (att) {
    h += '<h3 style="color:var(--pri);margin-bottom:8px;font-size:15px">📅 ปฏิทินเข้างาน มี.ค. 2569</h3>';
    h += '<div class="cal-legend">';
    [{c:"var(--ok)",l:"เต็มวัน"},{c:"#d97706",l:"ครึ่งวัน"},{c:"var(--err)",l:"ขาด"},{c:"#ccc",l:"หยุด"}].forEach(function(x){
      h += '<span><div class="dot" style="background:'+x.c+'"></div>'+x.l+'</span>';
    });
    h += '</div><div class="cal">';
    dayNames.forEach(function(dn){h += '<div class="dh">'+dn+'</div>';});
    var dow = new Date(2026,2,1).getDay();
    for (var pad=0;pad<dow;pad++) h += '<div></div>';
    for (var d=1;d<=31;d++) {
      var info = a.details[d];
      var cls = info?info.cls:"sunday";
      var parsed = info?info.parsed:null;
      var late = parsed&&parsed.checkIn&&(parsed.checkIn.h>9||(parsed.checkIn.h===9&&parsed.checkIn.m>5));
      h += '<div class="day day-'+cls+'"><div class="dn">'+d+'</div>';
      if (parsed&&parsed.checkIn) h += '<div class="tin" style="color:'+(late?"#d97706":"var(--ok)")+'">'+String(parsed.checkIn.h).padStart(2,"0")+':'+String(parsed.checkIn.m).padStart(2,"0")+'</div>';
      if (parsed&&parsed.checkOut) h += '<div class="tout">'+String(parsed.checkOut.h).padStart(2,"0")+':'+String(parsed.checkOut.m).padStart(2,"0")+'</div>';
      if (cls==="half") h += '<div class="tag" style="color:#d97706">½</div>';
      else if (cls==="absent") h += '<div class="tag" style="color:var(--err)">✗</div>';
      else if (cls==="sunday") h += '<div class="tag" style="color:#bbb">−</div>';
      h += '</div>';
    }
    h += '</div>';
  }

  document.getElementById("modalContent").innerHTML = h;
  document.getElementById("modalBg").style.display = "flex";
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modalBg").style.display = "none";
  document.body.style.overflow = "";
}

document.addEventListener("keydown",function(e){if(e.key==="Escape")closeModal()});

// Init
renderStats();
renderFilters();
render();
</script>
