.upload-icon{color:var(--text-muted);margin-bottom:6px;display:flex;justify-content:center}.upload-text{font-size:14px;color:var(--text-sec);font-weight:500}.upload-hint{font-size:12px;color:var(--text-muted);margin-top:3px}

.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:var(--shadow-sm)}
.stat-card .label{font-size:12px;color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.stat-card .value{font-size:28px;font-weight:700;color:var(--primary)}.stat-card .sub{font-size:12px;color:var(--text-muted);margin-top:4px}
.toolbar{display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.search-wrap{flex:1;min-width:240px;position:relative}.search-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-muted)}
.search-wrap input{width:100%;padding:11px 14px 11px 40px;border:1px solid var(--border);border-radius:9px;font-size:14px;font-family:inherit;background:var(--card);color:var(--text);box-shadow:var(--shadow-sm);outline:none;transition:all .2s}
.search-wrap input:focus{border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(58,107,159,.1)}
.results-info{font-size:13px;color:var(--text-muted);margin-bottom:14px;font-weight:500}
.table-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:13px 16px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);background:var(--input-bg);border-bottom:1px solid var(--border)}
td{padding:13px 16px;font-size:14px;border-bottom:1px solid var(--border-light);vertical-align:middle}
tr:last-child td{border-bottom:none}tbody tr{transition:background .12s;cursor:pointer}tbody tr:hover{background:rgba(193,125,46,.03)}
.name-cell{font-weight:600;color:var(--primary)}.email-cell{font-size:12px;color:var(--text-muted);margin-top:1px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.doc-badges{display:flex;gap:5px}.doc-badge{font-size:11px;padding:2px 8px;border-radius:12px;font-weight:500}
.doc-yes{background:rgba(22,163,74,.1);color:var(--success)}.doc-no{background:rgba(220,38,38,.08);color:var(--danger)}
.action-btn{padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:var(--card);cursor:pointer;color:var(--text-sec);transition:all .15s;display:flex;align-items:center}
.action-btn:hover{border-color:var(--primary-light);color:var(--primary);background:var(--input-bg)}
.detail-page{max-width:800px}
.detail-top{display:flex;align-items:center;gap:18px;margin-bottom:24px}
.detail-avatar{width:64px;height:64px;background:linear-gradient(135deg,var(--primary),var(--primary-mid));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#fff;flex-shrink:0}
.detail-name{font-size:24px;font-weight:700;color:var(--primary)}.detail-pos{font-size:14px;color:var(--accent);font-weight:600;margin-top:2px}
.detail-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.d-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;box-shadow:var(--shadow-sm)}
.d-card h4{font-size:13px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.d-row{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:14px;color:var(--text)}.d-row svg{color:var(--text-muted);flex-shrink:0}
.d-intro{font-size:14px;line-height:1.8;color:var(--text-sec)}
.status-select{padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer;outline:none;background:var(--card)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}.empty-state p{font-size:15px;font-weight:500;margin-top:12px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s}
.modal{background:var(--card);border-radius:16px;max-width:660px;width:100%;max-height:80vh;overflow-y:auto;padding:32px;box-shadow:var(--shadow-lg);animation:scaleIn .25s}
.modal h2{font-size:20px;font-weight:700;color:var(--primary);margin-bottom:16px}
.modal pre{background:#1e293b;color:#e2e8f0;padding:16px;border-radius:10px;font-size:11.5px;line-height:1.6;overflow-x:auto;margin:12px 0}
.modal ol{padding-left:20px;font-size:14px;line-height:1.9}
.modal .close-btn{margin-top:18px;width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes scaleIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
@media(max-width:900px){.sidebar{display:none}.admin-content{margin-left:0}.stats-grid{grid-template-columns:repeat(2,1fr)}.detail-cards{grid-template-columns:1fr}}
@media(max-width:640px){.form-grid{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr 1fr}.toolbar{flex-direction:column}}
.pos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-top:20px}
.pos-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:22px;box-shadow:var(--shadow-sm);transition:all .2s;position:relative}
.pos-card:hover{box-shadow:var(--shadow-md)}
.pos-card.inactive{opacity:.6}
.pos-title{font-size:16px;font-weight:700;color:var(--primary);margin-bottom:4px}
.pos-dept{font-size:13px;color:var(--accent);font-weight:500;margin-bottom:12px}
.pos-meta{display:flex;gap:16px;font-size:13px;color:var(--text-sec)}
.pos-meta span{display:flex;align-items:center;gap:5px}
.pos-actions{display:flex;gap:6px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border-light)}
.toggle{position:relative;width:44px;height:24px;border-radius:12px;cursor:pointer;transition:background .2s;border:none;padding:0;flex-shrink:0}
.toggle.on{background:var(--success)}.toggle.off{background:var(--border)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle.on::after{transform:translateX(20px)}
.add-pos-form{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:var(--shadow)}
.add-pos-form h3{font-size:16px;font-weight:600;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
`;

// ─── Components ───
function Toast({msg,type,onClose}){useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[onClose]);return<div className={`toast ${type}`}>{type==="success"&&<I.Check/>}{msg}</div>}

function FileUpload({label,file,onChange}){
  const ref=useRef();
  const rm=e=>{e.stopPropagation();onChange(null);if(ref.current)ref.current.value=""};
  return(
    <div className="field full">
      <label>{label} <span className="req">*</span></label>
      <div className={`upload-zone ${file?"done":""}`}>
        <input ref={ref} type="file" accept="image/*,.pdf" onChange={e=>onChange(e.target.files[0]||null)}/>
        {file?<div className="file-info"><I.Check/><span>{file.name}</span><button className="rm-file" onClick={rm}><I.X/></button></div>
        :<><div className="upload-icon"><I.Upload/></div><div className="upload-text">คลิกเพื่ออัปโหลด</div><div className="upload-hint">JPG, PNG, PDF (ไม่เกิน 5MB)</div></>}
      </div>
    </div>
  );
}

// ═══ PUBLIC FORM ═══
function PublicForm({onSubmit,onGoAdmin,positions}){
  const [f,setF]=useState({fullName:"",email:"",phone:"",position:"",education:"",experience:"",introduction:""});
  const [cred,setCred]=useState(null);const [idCard,setIdCard]=useState(null);const [errs,setErrs]=useState({});
  const set=k=>e=>setF({...f,[k]:e.target.value});
  const activePositions=positions.filter(p=>p.active);
  const submit=()=>{
    const er={};if(!f.fullName.trim())er.fullName=true;if(!f.phone.trim())er.phone=true;if(!f.position.trim())er.position=true;if(!cred)er.cred=true;if(!idCard)er.idCard=true;setErrs(er);if(Object.keys(er).length)return;
    onSubmit({...f,hasCredential:!!cred,hasIdCard:!!idCard,submittedAt:new Date().toISOString().split("T")[0],id:Date.now(),status:"new"});
    setF({fullName:"",email:"",phone:"",position:"",education:"",experience:"",introduction:""});setCred(null);setIdCard(null);
  };
  return(
    <div style={{minHeight:"100vh",background:"var(--bg)"}}>
      <header className="pub-header"><div className="pub-header-inner">
        <div className="pub-brand"><div className="pub-logo">HR</div><div><h1>ระบบรับสมัครงาน</h1><p>Job Application Portal</p></div></div>
        <button className="admin-link" onClick={onGoAdmin}><I.Lock/> เข้าหลังบ้าน</button>
      </div></header>
      <div className="pub-main">
        <h2 className="pub-title">ฟอร์มสมัครงาน</h2><p className="pub-sub">กรอกข้อมูลให้ครบถ้วน พร้อมแนบเอกสารประกอบ</p>
        <div className="form-card"><div className="form-card-title"><span className="dot"/>ข้อมูลส่วนตัว</div>
          <div className="form-grid">
            <div className={`field ${errs.fullName?"err":""}`}><label>ชื่อ - สกุล <span className="req">*</span></label><input value={f.fullName} onChange={set("fullName")} placeholder="กรอกชื่อ-สกุล"/></div>
            <div className="field"><label>อีเมล</label><input type="email" value={f.email} onChange={set("email")} placeholder="example@email.com"/></div>
            <div className={`field ${errs.phone?"err":""}`}><label>โทรศัพท์ <span className="req">*</span></label><input value={f.phone} onChange={set("phone")} placeholder="08X-XXX-XXXX"/></div>
            <div className={`field ${errs.position?"err":""}`}><label>ตำแหน่งที่สมัคร <span className="req">*</span></label><select value={f.position} onChange={set("position")}><option value="">-- เลือกตำแหน่ง --</option>{activePositions.map(p=><option key={p.id} value={p.title}>{p.title} ({p.department})</option>)}</select></div>
          </div></div>
        <div className="form-card"><div className="form-card-title"><span className="dot"/>คุณสมบัติ</div>
          <div className="form-grid">
            <div className="field"><label>วุฒิการศึกษา</label><input value={f.education} onChange={set("education")} placeholder="เช่น ปริญญาตรี วิศวกรรมคอมพิวเตอร์"/></div>
            <div className="field"><label>ประสบการณ์ทำงาน</label><select value={f.experience} onChange={set("experience")}><option value="">-- เลือก --</option><option value="ไม่มี">ไม่มีประสบการณ์</option><option value="1-2 ปี">1 - 2 ปี</option><option value="3-5 ปี">3 - 5 ปี</option><option value="5-10 ปี">5 - 10 ปี</option><option value="มากกว่า 10 ปี">มากกว่า 10 ปี</option></select></div>
            <div className="field full"><label>แนะนำตัวเอง</label><textarea value={f.introduction} onChange={set("introduction")} placeholder="บอกเล่าเกี่ยวกับตัวคุณ..." rows={4}/></div>
          </div></div>
        <div className="form-card"><div className="form-card-title"><span className="dot"/>แนบเอกสาร</div>
          <div className="form-grid">
            <FileUpload label="วุฒิการศึกษา / Transcript" file={cred} onChange={setCred}/>
            <FileUpload label="สำเนาบัตรประชาชน" file={idCard} onChange={setIdCard}/>
          </div></div>
        <div className="submit-row"><button className="btn btn-accent" onClick={submit}>ส่งใบสมัคร</button></div>
      </div>
    </div>
  );
}

// ═══ LOGIN ═══
function LoginPage({onLogin,onBack}){
  const [u,setU]=useState("");const [p,setP]=useState("");const [err,setErr]=useState("");
  const go=()=>{if(u==="admin"&&p==="1234")onLogin();else setErr("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง")};
  return(
    <div className="login-page"><div className="login-box">
      <div className="login-logo">HR</div><h2>เข้าสู่ระบบหลังบ้าน</h2><p className="sub">สำหรับเจ้าหน้าที่ HR เท่านั้น</p>
      {err&&<div style={{background:"rgba(220,38,38,.08)",color:"var(--danger)",padding:"10px",borderRadius:8,fontSize:13,marginBottom:14,fontWeight:500}}>{err}</div>}
      <div className="field"><label>ชื่อผู้ใช้</label><input value={u} onChange={e=>setU(e.target.value)} placeholder="admin" onKeyDown={e=>e.key==="Enter"&&go()}/></div>
      <div className="field"><label>รหัสผ่าน</label><input type="password" value={p} onChange={e=>setP(e.target.value)} placeholder="••••" onKeyDown={e=>e.key==="Enter"&&go()}/></div>
      <button className="btn btn-accent" onClick={go}><I.Lock/> เข้าสู่ระบบ</button>
      <button className="btn btn-ghost" style={{width:"100%",justifyContent:"center",marginTop:8}} onClick={onBack}><I.Back/> กลับหน้าสมัครงาน</button>
      <p className="hint">ทดสอบ: admin / 1234</p>
    </div></div>
  );
}

// ═══ ADMIN PANEL ═══
function AdminPanel({applicants,setApplicants,positions,setPositions,onLogout,onGoPublic}){
  const [page,setPage]=useState("dashboard");
  const [selected,setSelected]=useState(null);
  const [search,setSearch]=useState("");
  const [statusFilter,setStatusFilter]=useState("all");
  const [posFilter,setPosFilter]=useState("all");
  const [showSetup,setShowSetup]=useState(false);
  const [toast,setToast]=useState(null);

  const counts={total:applicants.length,new:applicants.filter(a=>a.status==="new").length,reviewing:applicants.filter(a=>a.status==="reviewing").length,interview:applicants.filter(a=>a.status==="interview").length,accepted:applicants.filter(a=>a.status==="accepted").length,rejected:applicants.filter(a=>a.status==="rejected").length};

  const filtered=applicants.filter(a=>{
    const ms=a.fullName.toLowerCase().includes(search.toLowerCase())||a.email.toLowerCase().includes(search.toLowerCase())||a.phone.includes(search)||a.position.toLowerCase().includes(search.toLowerCase())||a.education?.toLowerCase().includes(search.toLowerCase());
    return ms&&(statusFilter==="all"||a.status===statusFilter)&&(posFilter==="all"||a.position===posFilter);
  });

  const positions=[...new Set(applicants.map(a=>a.position))];
  const updateStatus=(id,status)=>{setApplicants(applicants.map(a=>a.id===id?{...a,status}:a));if(selected?.id===id)setSelected({...selected,status});setToast({msg:"อัปเดตสถานะเรียบร้อย",type:"success"})};
  const deleteApplicant=(id)=>{setApplicants(applicants.filter(a=>a.id!==id));if(selected?.id===id){setSelected(null);setPage("list");}setToast({msg:"ลบข้อมูลเรียบร้อย",type:"success"})};

  const DashboardView=()=>(
    <>
      <h2 style={{fontSize:22,fontWeight:700,color:"var(--primary)",marginBottom:4}}>แดชบอร์ด</h2>
      <p style={{fontSize:14,color:"var(--text-muted)",marginBottom:24}}>ภาพรวมข้อมูลผู้สมัครทั้งหมด</p>
      <div className="stats-grid">
        <div className="stat-card"><div className="label">ผู้สมัครทั้งหมด</div><div className="value">{counts.total}</div><div className="sub">ทุกสถานะ</div></div>
        <div className="stat-card"><div className="label">รอพิจารณา</div><div className="value" style={{color:"#3b82f6"}}>{counts.new+counts.reviewing}</div><div className="sub">ใหม่ + กำลังพิจารณา</div></div>
        <div className="stat-card"><div className="label">นัดสัมภาษณ์</div><div className="value" style={{color:"#8b5cf6"}}>{counts.interview}</div><div className="sub">กำลังดำเนินการ</div></div>
        <div className="stat-card"><div className="label">ผ่านการคัดเลือก</div><div className="value" style={{color:"var(--accent)"}}>{counts.accepted}</div><div className="sub">ตอบรับแล้ว</div></div>
      </div>
      <div className="form-card" style={{marginBottom:20}}><div className="form-card-title"><span className="dot"/>สถิติตามสถานะ</div>
        <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>
          {Object.entries(STATUS_MAP).map(([k,v])=>{const c=counts[k]||0;const pct=counts.total?(c/counts.total*100):0;return(
            <div key={k} style={{flex:1,minWidth:90}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,fontWeight:600,marginBottom:6}}><span style={{color:v.color}}>{v.label}</span><span style={{color:"var(--text-muted)"}}>{c}</span></div>
              <div style={{height:8,borderRadius:4,background:"var(--border-light)",overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:v.color,borderRadius:4,transition:"width .5s"}}/></div>
            </div>
          )})}
        </div>
      </div>
      <div className="form-card"><div className="form-card-title"><span className="dot"/>ผู้สมัครล่าสุด</div>
        {applicants.slice(0,5).map(a=>(
          <div key={a.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px solid var(--border-light)",cursor:"pointer"}} onClick={()=>{setSelected(a);setPage("detail")}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,var(--primary),var(--primary-mid))",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:14}}>{a.fullName[0]}</div>
              <div><div style={{fontWeight:600,fontSize:14,color:"var(--primary)"}}>{a.fullName}</div><div style={{fontSize:12,color:"var(--text-muted)"}}>{a.position}</div></div>
            </div>
            <span className="badge" style={{background:STATUS_MAP[a.status].bg,color:STATUS_MAP[a.status].color}}>{STATUS_MAP[a.status].label}</span>
          </div>
        ))}
      </div>
    </>
  );

  const ListView=()=>(
    <>
      <h2 style={{fontSize:22,fontWeight:700,color:"var(--primary)",marginBottom:4}}>ผู้สมัครทั้งหมด</h2>
      <p style={{fontSize:14,color:"var(--text-muted)",marginBottom:20}}>ค้นหาและกรองข้อมูลผู้สมัครงาน</p>
      <div className="toolbar">
        <div className="search-wrap"><I.Search/><input placeholder="ค้นหาชื่อ, อีเมล, โทรศัพท์, ตำแหน่ง, วุฒิ..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
        <select className="btn btn-ghost btn-sm" value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={{cursor:"pointer",fontWeight:500}}><option value="all">ทุกสถานะ</option>{Object.entries(STATUS_MAP).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select>
        <select className="btn btn-ghost btn-sm" value={posFilter} onChange={e=>setPosFilter(e.target.value)} style={{cursor:"pointer",fontWeight:500}}><option value="all">ทุกตำแหน่ง</option>{positions.map(p=><option key={p} value={p}>{p}</option>)}</select>
      </div>
      <div className="results-info">พบ {filtered.length} รายการ {search&&`สำหรับ "${search}"`}</div>
      {filtered.length===0?<div className="empty-state"><I.Users/><p>ไม่พบข้อมูลผู้สมัคร</p></div>:(
        <div className="table-card"><table><thead><tr><th>ชื่อ-สกุล</th><th>ตำแหน่ง</th><th>ประสบการณ์</th><th>เอกสาร</th><th>สถานะ</th><th>วันที่</th><th style={{width:90}}></th></tr></thead>
          <tbody>{filtered.map(a=>(
            <tr key={a.id} onClick={()=>{setSelected(a);setPage("detail")}}>
              <td><div className="name-cell">{a.fullName}</div><div className="email-cell">{a.email}</div></td>
              <td>{a.position}</td><td>{a.experience||"-"}</td>
              <td><div className="doc-badges"><span className={`doc-badge ${a.hasCredential?"doc-yes":"doc-no"}`}>วุฒิ {a.hasCredential?"✓":"✗"}</span><span className={`doc-badge ${a.hasIdCard?"doc-yes":"doc-no"}`}>บัตร {a.hasIdCard?"✓":"✗"}</span></div></td>
              <td><span className="badge" style={{background:STATUS_MAP[a.status].bg,color:STATUS_MAP[a.status].color}}>{STATUS_MAP[a.status].label}</span></td>
              <td>{a.submittedAt}</td>
              <td onClick={e=>e.stopPropagation()}><div style={{display:"flex",gap:5}}>
                <button className="action-btn" title="ดูรายละเอียด" onClick={()=>{setSelected(a);setPage("detail")}}><I.Eye/></button>
                <button className="action-btn" title="ลบ" onClick={()=>{if(confirm("ลบข้อมูลผู้สมัคร "+a.fullName+" ?"))deleteApplicant(a.id)}} style={{color:"var(--danger)"}}><I.Trash/></button>
              </div></td>
            </tr>
          ))}</tbody></table></div>
      )}
    </>
  );

  const DetailView=()=>{
    if(!selected)return null;const a=applicants.find(x=>x.id===selected.id)||selected;
    return(
      <div className="detail-page">
        <div style={{display:"flex",gap:8,marginBottom:20}}>
          <button className="btn btn-ghost btn-sm" onClick={()=>setPage("list")}><I.Back/> กลับ</button>
          <button className="btn-danger-sm" onClick={()=>{if(confirm("ลบข้อมูลผู้สมัคร "+a.fullName+" ?"))deleteApplicant(a.id)}}><I.Trash/> ลบ</button>
        </div>
        <div className="detail-top">
          <div className="detail-avatar">{a.fullName[0]}</div>
          <div style={{flex:1}}><div className="detail-name">{a.fullName}</div><div className="detail-pos">{a.position}</div></div>
          <div>
            <label style={{fontSize:12,color:"var(--text-muted)",fontWeight:600,display:"block",marginBottom:4}}>เปลี่ยนสถานะ</label>
            <select className="status-select" value={a.status} onChange={e=>updateStatus(a.id,e.target.value)} style={{color:STATUS_MAP[a.status]?.color,borderColor:STATUS_MAP[a.status]?.color}}>
              {Object.entries(STATUS_MAP).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
            </select>
          </div>
        </div>
        <div className="detail-cards">
          <div className="d-card"><h4>ข้อมูลติดต่อ</h4><div className="d-row"><I.Mail/> {a.email||"-"}</div><div className="d-row"><I.Phone/> {a.phone}</div><div className="d-row"><I.Calendar/> สมัครเมื่อ {a.submittedAt}</div></div>
          <div className="d-card"><h4>คุณสมบัติ</h4><div className="d-row"><I.Briefcase/> {a.position}</div><div className="d-row"><I.File/> {a.education||"-"}</div><div className="d-row"><I.Chart/> ประสบการณ์: {a.experience||"-"}</div></div>
          <div className="d-card"><h4>เอกสารแนบ</h4>
            <div style={{display:"flex",gap:12,marginTop:4}}>
              <div style={{flex:1,padding:16,borderRadius:8,border:"1px solid var(--border)",textAlign:"center"}}><I.File/><div style={{fontSize:13,fontWeight:600,marginTop:6}}>วุฒิการศึกษา</div><span className={`doc-badge ${a.hasCredential?"doc-yes":"doc-no"}`} style={{marginTop:6,display:"inline-block"}}>{a.hasCredential?"แนบแล้ว ✓":"ยังไม่แนบ"}</span></div>
              <div style={{flex:1,padding:16,borderRadius:8,border:"1px solid var(--border)",textAlign:"center"}}><I.File/><div style={{fontSize:13,fontWeight:600,marginTop:6}}>บัตรประชาชน</div><span className={`doc-badge ${a.hasIdCard?"doc-yes":"doc-no"}`} style={{marginTop:6,display:"inline-block"}}>{a.hasIdCard?"แนบแล้ว ✓":"ยังไม่แนบ"}</span></div>
            </div>
          </div>
          {a.introduction&&<div className="d-card"><h4>แนะนำตัว</h4><p className="d-intro">{a.introduction}</p></div>}
        </div>
      </div>
    );
  };

  // ─── Positions View ───
  const [posForm,setPosForm]=useState({title:"",department:"",slots:1});
  const [editingPos,setEditingPos]=useState(null);
  const [showPosForm,setShowPosForm]=useState(false);

  const addPosition=()=>{
    if(!posForm.title.trim()||!posForm.department.trim())return;
    if(editingPos){
      setPositions(positions.map(p=>p.id===editingPos.id?{...p,title:posForm.title,department:posForm.department,slots:Number(posForm.slots)||1}:p));
      setEditingPos(null);
    }else{
      setPositions([...positions,{id:Date.now(),title:posForm.title,department:posForm.department,slots:Number(posForm.slots)||1,active:true,createdAt:new Date().toISOString().split("T")[0]}]);
    }
    setPosForm({title:"",department:"",slots:1});setShowPosForm(false);
    setToast({msg:editingPos?"แก้ไขตำแหน่งเรียบร้อย":"เพิ่มตำแหน่งเรียบร้อย",type:"success"});
  };
  const startEditPos=(p)=>{setEditingPos(p);setPosForm({title:p.title,department:p.department,slots:p.slots});setShowPosForm(true)};
  const togglePos=(id)=>setPositions(positions.map(p=>p.id===id?{...p,active:!p.active}:p));
  const deletePos=(id)=>{if(confirm("ลบตำแหน่งนี้?"))setPositions(positions.filter(p=>p.id!==id))};
  const cancelPosForm=()=>{setPosForm({title:"",department:"",slots:1});setEditingPos(null);setShowPosForm(false)};

  const PositionsView=()=>{
    const activeCount=positions.filter(p=>p.active).length;
    return(
    <>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
        <div><h2 style={{fontSize:22,fontWeight:700,color:"var(--primary)",marginBottom:4}}>ตำแหน่งที่รับสมัคร</h2><p style={{fontSize:14,color:"var(--text-muted)"}}>จัดการตำแหน่งงานที่เปิดรับ ({activeCount} ตำแหน่งเปิดรับอยู่)</p></div>
        {!showPosForm&&<button className="btn btn-accent btn-sm" onClick={()=>{setEditingPos(null);setPosForm({title:"",department:"",slots:1});setShowPosForm(true)}}><I.Plus/> เพิ่มตำแหน่ง</button>}
      </div>

      {showPosForm&&(
        <div className="add-pos-form" style={{marginTop:20}}>
          <h3><span className="dot"/>{editingPos?"แก้ไขตำแหน่ง":"เพิ่มตำแหน่งใหม่"}</h3>
          <div className="form-grid">
            <div className="field"><label>ชื่อตำแหน่ง <span className="req">*</span></label><input value={posForm.title} onChange={e=>setPosForm({...posForm,title:e.target.value})} placeholder="เช่น นักพัฒนาซอฟต์แวร์"/></div>
            <div className="field"><label>แผนก <span className="req">*</span></label><input value={posForm.department} onChange={e=>setPosForm({...posForm,department:e.target.value})} placeholder="เช่น ฝ่ายเทคโนโลยี"/></div>
            <div className="field"><label>จำนวนที่รับ</label><input type="number" min="1" value={posForm.slots} onChange={e=>setPosForm({...posForm,slots:e.target.value})}/></div>
          </div>
          <div style={{display:"flex",gap:8,marginTop:16,justifyContent:"flex-end"}}>
            <button className="btn btn-ghost btn-sm" onClick={cancelPosForm}>ยกเลิก</button>
            <button className="btn btn-accent btn-sm" onClick={addPosition}>{editingPos?"บันทึก":"เพิ่มตำแหน่ง"}</button>
          </div>
        </div>
      )}

      <div className="pos-grid">
        {positions.map(p=>{
          const appCount=applicants.filter(a=>a.position===p.title).length;
          return(
            <div key={p.id} className={`pos-card ${p.active?"":"inactive"}`}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div><div className="pos-title">{p.title}</div><div className="pos-dept">{p.department}</div></div>
                <button className={`toggle ${p.active?"on":"off"}`} onClick={()=>togglePos(p.id)} title={p.active?"เปิดรับอยู่":"ปิดรับแล้ว"}/>
              </div>
              <div className="pos-meta">
                <span><I.Users/> ผู้สมัคร {appCount} คน</span>
                <span><I.Briefcase/> รับ {p.slots} ตำแหน่ง</span>
              </div>
              <div style={{marginTop:8}}>
                <div style={{height:6,borderRadius:3,background:"var(--border-light)",overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${Math.min((appCount/p.slots)*100,100)}%`,background:appCount>=p.slots?"var(--success)":"var(--primary-light)",borderRadius:3,transition:"width .4s"}}/>
                </div>
                <div style={{fontSize:11,color:"var(--text-muted)",marginTop:4}}>{appCount}/{p.slots} ({p.active?<span style={{color:"var(--success)"}}>เปิดรับ</span>:<span style={{color:"var(--danger)"}}>ปิดรับ</span>})</div>
              </div>
              <div className="pos-actions">
                <button className="btn btn-ghost btn-sm" onClick={()=>startEditPos(p)}><I.Eye/> แก้ไข</button>
                <button className="btn-danger-sm" onClick={()=>deletePos(p.id)}><I.Trash/> ลบ</button>
              </div>
            </div>
          );
        })}
      </div>
    </>
    );
  };

  return(
    <div className="admin">
      <aside className="sidebar">
        <div className="sb-brand"><div className="sb-logo">HR</div><div><h2>Admin Panel</h2><p>ระบบหลังบ้าน</p></div></div>
        <nav className="sb-nav">
          <button className={`sb-link ${page==="dashboard"?"active":""}`} onClick={()=>setPage("dashboard")}><I.Dashboard/> แดชบอร์ด</button>
          <button className={`sb-link ${page==="list"||page==="detail"?"active":""}`} onClick={()=>{setPage("list");setSelected(null)}}><I.Users/> ผู้สมัครงาน <span className="count">{counts.total}</span></button>
          <button className={`sb-link ${page==="positions"?"active":""}`} onClick={()=>setPage("positions")}><I.Briefcase/> ตำแหน่งงาน <span className="count">{positions.filter(p=>p.active).length}</span></button>
          <button className="sb-link" onClick={()=>setShowSetup(true)}><I.Gear/> ตั้งค่า Google Sheets</button>
        </nav>
        <div className="sb-bottom">
          <button className="sb-link" onClick={onGoPublic}><I.Globe/> หน้าสมัครงาน</button>
          <button className="sb-link" onClick={onLogout}><I.Logout/> ออกจากระบบ</button>
        </div>
      </aside>
      <main className="admin-content">
        {page==="dashboard"&&DashboardView()}
        {page==="list"&&ListView()}
        {page==="detail"&&DetailView()}
        {page==="positions"&&PositionsView()}
      </main>
      {showSetup&&<div className="modal-bg" onClick={()=>setShowSetup(false)}><div className="modal" onClick={e=>e.stopPropagation()}>
        <h2>🔧 เชื่อมต่อ Google Sheets</h2>
        <ol><li>สร้าง Google Sheet ตั้งชื่อ Sheet ว่า <strong>"Applications"</strong></li><li>เพิ่ม Header: วันที่, ชื่อ-สกุล, อีเมล, โทรศัพท์, ตำแหน่ง, วุฒิ, ประสบการณ์, แนะนำตัว, สถานะ</li><li>ไปที่ Extensions → Apps Script</li><li>วางโค้ดแล้ว Deploy เป็น Web App</li></ol>
        <pre>{`function doPost(e) {
  var ss = SpreadsheetApp.getActiveSpreadsheet()
    .getSheetByName("Applications");
  var d = JSON.parse(e.postData.contents);
  ss.appendRow([new Date(), d.fullName, d.email,
    d.phone, d.position, d.education,
    d.experience, d.introduction, "new",
    d.credentialFile, d.idCardFile]);
  return ContentService
    .createTextOutput(JSON.stringify({status:"ok"}))
    .setMimeType(ContentService.MimeType.JSON);
}

function doGet(e) {
  var ss = SpreadsheetApp.getActiveSpreadsheet()
    .getSheetByName("Applications");
  var data = ss.getDataRange().getValues();
  var headers = data[0], results = [];
  var q = (e.parameter.search || "").toLowerCase();
  for (var i=1; i<data.length; i++) {
    var r = {};
    for (var j=0; j<headers.length; j++)
      r[headers[j]] = data[i][j];
    if (!q || String(r["ชื่อ-สกุล"])
        .toLowerCase().includes(q))
      results.push(r);
  }
  return ContentService
    .createTextOutput(JSON.stringify(results))
    .setMimeType(ContentService.MimeType.JSON);
}`}</pre>
        <button className="close-btn" onClick={()=>setShowSetup(false)}>ปิด</button>
      </div></div>}
      {toast&&<Toast {...toast} onClose={()=>setToast(null)}/>}
    </div>
  );
}

// ═══ MAIN ═══
function App(){
  const [view,setView]=useState("public");
  const [applicants,setApplicants]=useState(INITIAL_DATA);
  const [positions,setPositions]=useState(INITIAL_POSITIONS);
  const [toast,setToast]=useState(null);
  const handleSubmit=data=>{setApplicants([data,...applicants]);setToast({msg:"ส่งใบสมัครเรียบร้อยแล้ว!",type:"success"})};
  return(
    <><style>{css}</style>
      {view==="public"&&<PublicForm onSubmit={handleSubmit} onGoAdmin={()=>setView("login")} positions={positions}/>}
      {view==="login"&&<LoginPage onLogin={()=>setView("admin")} onBack={()=>setView("public")}/>}
      {view==="admin"&&<AdminPanel applicants={applicants} setApplicants={setApplicants} positions={positions} setPositions={setPositions} onLogout={()=>setView("login")} onGoPublic={()=>setView("public")}/>}
      {toast&&<Toast {...toast} onClose={()=>setToast(null)}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
